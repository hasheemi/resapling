<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resapling: Login</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/theme.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link href="https://unpkg.com/aos@2.3.2/dist/aos.css" rel="stylesheet" />
    <script src="https://unpkg.com/aos@2.3.2/dist/aos.js"></script>
  </head>
  <body
    class="bg-leaf-50 w-screen min-h-screen md:min-h-1 md:h-screen relative flex login-page justify-center items-center"
  >
    <div
      class="login bg-leaf-50 w-4/5 lg:w-[65%] md:!h-[90%] p-4 m-auto relative z-20 rounded-xl shadow-xl flex flex-col md:flex-row md:justify-between gap-4 md:gap-0 my-10 md:my-0"
    >
      <div
        class="left w-full md:w-[55%] flex flex-col justify-center items-center bg-[#f4fff0] rounded-l-xl"
      >
        <h2 class="text-3xl text-leaf-975 font-bold mb-6 mt-6 md:mt-4">
          Login Resapling
        </h2>

        <form class="w-11/12 md:w-3/4 mx-auto transition duration-300">
          <div class="mb-4">
            <label class="block text-sm font-medium mb-2" for="username">
              Username / Email
            </label>
            <input
              class="border text-sm shadow-lg appearance-none rounded-lg w-full py-3 px-6 leading-tight border-gray-400 focus:border-2 focus:border-leaf-500 focus:outline-none"
              id="username"
              type="text"
              placeholder="Enter your username or email"
            />
          </div>
          <div class="mb-6">
            <label class="block text-sm font-medium mb-2" for="password">
              Password
            </label>
            <input
              class="border text-sm shadow-lg appearance-none rounded-lg w-full py-3 px-6 leading-tight border-gray-400 focus:border-2 focus:border-leaf-500 focus:outline-none focus:shadow-outline"
              id="password"
              type="password"
              placeholder="********"
            />
          </div>
          <div class="mb-4">
            <button
              class="bg-leaf-600 hover:bg-leaf-700 text-white font-bold py-3 px-6 rounded w-full transition duration-300 shadow-lg hover:shadow-xl"
              type="button"
            >
              Login
            </button>
          </div>
          <div class="flex items-center justify-center mb-4">
            <hr class="border-t border-gray-300 w-full" />
            <span class="px-2 text-gray-500 text-sm">dengan</span>
            <hr class="border-t border-gray-300 w-full" />
          </div>

          <div class="flex flex-row justify-between gap-4">
            <button
              class="bg-white border border-gray-300 hover:bg-gray-100 text-gray-700 font-semibold py-3 px-6 rounded flex items-center justify-center gap-2 transition duration-300 w-1/2 text-sm !m-0"
            >
              <img
                src="https://www.svgrepo.com/show/475656/google-color.svg"
                class="h-5 w-5"
                alt="Google logo"
              />
              Google
            </button>
            <button
              class="bg-[#3b5998] hover:bg-[#334d84] text-white font-semibold py-3 px-6 rounded flex items-center justify-center gap-2 transition duration-300 w-1/2 text-sm !m-0"
            >
              <i class="bx bxl-facebook text-xl"></i>
              Facebook
            </button>
          </div>
        </form>
      </div>

      <div class="right w-full md:w-[45%] p-4 relative flex items-end">
        <img
          src="../assets/img/background/aloha.jpg"
          alt=""
          class="w-full aspect-video md:aspect-auto h-auto md:h-full object-cover obje rounded-lg shadow-2xl static md:absolute inset-0 hidden md:block"
        />
        <div
          class="quote w-full p-4 rounded-lg bg-white relative z-10 text-sm shadow-lg"
        >
          <blockquote class="w-full">
            Hutan adalah paru-paru bumi kita sendiri, memurnikan udara dan
            memberikan kekuatan segar kepada rakyat kita.
            <span class="italic font-light">~ Franklin D. Roosevelt</span>
          </blockquote>
        </div>
      </div>
    </div>
    <script src="../assets/js/core.js"></script>
  </body>
</html>
